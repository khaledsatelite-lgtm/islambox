<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Islam Box Tech</title>
<style>
:root{--bg:#060d1a;--bg2:#0b1525;--bg3:#0f1d30;--border:#1a3050;--blue:#3b8bff;--blue2:#1a5fe0;--green:#00e676;--orange:#ff9100;--red:#ff4444;--purple:#c084fc;--text:#e8f0fe;--text2:#8aa4c8;--text3:#4a6480;--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;min-height:100vh}
input,select,textarea,button{font-family:inherit;direction:rtl;outline:none}
#hdr{background:#0a1628;border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:800}
.logo-sub{font-size:10px;color:var(--text3)}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);padding:7px 9px;cursor:pointer;font-size:14px}
nav{display:flex;border-top:1px solid var(--border);margin:0 -14px}
.nb{flex:1;padding:9px 2px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;margin-bottom:-1px}
.nb span{font-size:16px}
.nb.on{color:var(--blue);border-bottom-color:var(--blue)}
#pg{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.ttl{font-size:18px;font-weight:800;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer}
.stat-line{height:2px;margin:-14px -14px 10px;border-radius:var(--r) var(--r) 0 0}
.stat-ico{font-size:22px;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.stat-wide{grid-column:span 2}
.alert{border-radius:var(--r);padding:12px;margin-bottom:12px;border:1px solid}
.alert-w{background:rgba(255,145,0,.08);border-color:rgba(255,145,0,.3)}
.alert-e{background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3)}
.a-ttl{font-size:13px;font-weight:700;margin-bottom:8px}
.alert-w .a-ttl{color:var(--orange)}
.alert-e .a-ttl{color:var(--red)}
.arow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.arow:last-child{border-bottom:none}
.bOK{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bWN{background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bEX{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bPD{background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.list-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.add-btn{background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);padding:9px 16px;cursor:pointer;font-weight:700;font-size:12px}
.sr{display:flex;gap:8px;margin-bottom:12px}
.si{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:13px}
.si:focus{border-color:var(--blue)}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--text);font-size:12px}
.empty{text-align:center;color:var(--text3);padding:50px 20px;font-size:15px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;cursor:pointer}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.cc-name{font-weight:700;font-size:14px}
.cc-phone{font-size:11px;color:var(--text3);margin-top:2px}
.cc-bot{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);border-top:1px solid var(--border);padding-top:7px;flex-wrap:wrap;gap:4px}
.fw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.fl{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:12px;font-weight:600}
.fl:first-child{margin-top:0}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px 12px;color:var(--text);font-size:14px}
.fi:focus{border-color:var(--blue)}
.dr{display:flex;gap:6px;flex-wrap:wrap}
.db{flex:1;min-width:55px;padding:10px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:12px;text-align:center}
.db.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.lb{flex:1;min-width:65px;padding:9px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:11px;text-align:center}
.lb.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.prev{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:2}
.sbtn{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:15px;font-weight:800}
.cbox{background:var(--bg);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);padding:12px;margin-top:12px}
.cbox-t{color:var(--blue);font-size:12px;font-weight:700;margin-bottom:8px}
.neo-box{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.neo-t{color:var(--purple);font-size:13px;font-weight:700;margin-bottom:10px}
.neo-btn{width:100%;margin-top:8px;padding:10px;background:linear-gradient(135deg,#6d28d9,var(--blue2));color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;padding:8px 14px;font-weight:600}
.dh{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px}
.dav{width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 10px}
.dn{font-size:20px;font-weight:800}
.dp{color:var(--text3);font-size:13px;margin:4px 0 10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.di{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.di-l{color:var(--text3)}
.dacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.bwa{flex:1;padding:11px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bedit{flex:1;padding:11px;background:rgba(59,139,255,.1);color:var(--blue);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bdel{padding:11px 14px;background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bren{width:100%;margin-top:7px;padding:11px;background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bpay{width:100%;margin-top:7px;padding:11px;background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px}
.crow:last-of-type{border-bottom:none}
.cvals{display:flex;align-items:center;gap:5px;max-width:65%}
.cv{font-family:monospace;font-size:11px;word-break:break-all}
.cpb{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:3px 7px;font-size:11px}
.pay-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.pay-stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.ps{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;text-align:center}
.ps-v{font-size:18px;font-weight:900;margin-bottom:2px}
.ps-l{font-size:10px;color:var(--text3)}
.cat-st{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;padding:8px 12px;background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs)}
.pkg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.pkg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pkg-name{font-size:14px;font-weight:800}
.pkg-price{font-size:18px;font-weight:900;color:var(--green)}
.pkg-dur{font-size:11px;color:var(--text3)}
.pkg-btns{display:flex;gap:7px}
.pbtn{flex:1;padding:9px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:700;border:1px solid;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
.pbtn-c{background:rgba(59,139,255,.1);color:var(--blue);border-color:rgba(59,139,255,.3)}
.pbtn-w{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.3)}
.tmpl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px}
.tmpl-t{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}
.tmpl-p{font-size:11px;color:var(--text3);line-height:1.7;margin-bottom:10px;background:var(--bg);border-radius:6px;padding:8px;max-height:80px;overflow:hidden}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mttl{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--blue)}
.mta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px;color:var(--text);font-size:12px;line-height:1.9;resize:none}
.mt-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.mt{flex:1;min-width:60px;padding:7px 4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:10px;text-align:center}
.mt.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.macts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.mcopy{flex:1;padding:10px;background:rgba(59,139,255,.15);color:var(--blue);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.mwa{flex:1;padding:10px;background:rgba(0,230,118,.1);color:var(--green);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
.mclose{padding:10px 14px;background:rgba(255,68,68,.1);color:var(--red);border:none;border-radius:var(--rs);cursor:pointer}
#sal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;padding:14px}
#sal.show{display:flex}
.sal-box{background:var(--bg2);border:2px solid rgba(255,145,0,.5);border-radius:16px;padding:18px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.sal-t{font-size:16px;font-weight:800;color:var(--orange);margin-bottom:12px;text-align:center}
.sal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;font-size:12px}
.sal-row:last-of-type{border-bottom:none}
.sal-f{display:flex;gap:7px;margin-top:12px}
.sal-all{flex:1;padding:12px;background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:800;font-size:13px}
.sal-sk{padding:12px 14px;background:var(--bg);color:var(--text3);border:none;border-radius:var(--rs);cursor:pointer}
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:2000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
select{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px 8px;color:var(--text);font-size:14px}
@media print{#hdr,#sal,.ov,.bk,.dacts,.add-btn{display:none!important}body{background:#fff;color:#000}.cc,.dh{border:1px solid #ddd;background:#fff}}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-top">
    <div class="logo-wrap">
      <div class="logo-icon">📺</div>
      <div><div class="logo-text">Islam Box Tech</div><div class="logo-sub">Zeboudja — إدارة الاشتراكات</div></div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="expBk()">💾</button>
      <button class="hdr-btn" onclick="document.getElementById('impf').click()">📥</button>
      <input type="file" id="impf" accept=".json" style="display:none" onchange="impBk(event)"/>
    </div>
  </div>
  <nav>
    <button class="nb on" onclick="go('dash')"><span>🏠</span>الرئيسية</button>
    <button class="nb" onclick="go('list')"><span>👥</span>الزبائن</button>
    <button class="nb" onclick="go('pay')"><span>💰</span>الدفعات</button>
    <button class="nb" onclick="go('cat')"><span>📦</span>الكتالوج</button>
    <button class="nb" onclick="go('add')"><span>➕</span>جديد</button>
  </nav>
</div>
<div id="pg"></div>

<div id="sal">
  <div class="sal-box">
    <div class="sal-t">🔔 اشتراكات تنتهي قريباً!</div>
    <div id="sal-list"></div>
    <div class="sal-f">
      <button class="sal-all" onclick="sendAll()">📩 إرسال للكل</button>
      <button class="sal-sk" onclick="document.getElementById('sal').classList.remove('show')">تجاوز</button>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl" id="mttl"></div>
    <div class="mt-row">
      <button class="mt on" onclick="setMT(this,'auto')">🔄 تلقائي</button>
      <button class="mt" onclick="setMT(this,'reminder')">⚠️ تذكير</button>
      <button class="mt" onclick="setMT(this,'expired')">❌ منتهي</button>
      <button class="mt" onclick="setMT(this,'active')">✅ نشط</button>
    </div>
    <textarea class="mta" id="mta" rows="8"></textarea>
    <div class="macts">
      <button class="mcopy" onclick="cpyMsg()">📋 نسخ</button>
      <a class="mwa" id="mwal" href="#" target="_blank">💬 واتساب</a>
      <button class="mclose" onclick="document.getElementById('ov').classList.remove('show')">✕</button>
    </div>
  </div>
</div>

<div class="ov" id="eov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl">✏️ تعديل الزبون</div>
    <label class="fl">الاسم</label><input class="fi" type="text" id="en"/>
    <label class="fl">رقم الهاتف</label><input class="fi" type="text" id="ep"/>
    <label class="fl">اسم الاشتراك</label><input class="fi" type="text" id="es"/>
    <label class="fl">السعر (دج)</label><input class="fi" type="number" id="epr"/>
    <label class="fl">تاريخ الانتهاء</label><input class="fi" type="date" id="eed"/>
    <label class="fl">يوم الدفع الشهري (1-31)</label><input class="fi" type="number" id="epd" min="1" max="31"/>
    <label class="fl">رابط السيرفر</label><input class="fi" type="text" id="esrv"/>
    <label class="fl">اسم المستخدم</label><input class="fi" type="text" id="eu"/>
    <label class="fl">كلمة المرور</label><input class="fi" type="text" id="epw"/>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="saveEdit()" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:800;font-size:14px">✅ حفظ</button>
      <button onclick="document.getElementById('eov').classList.remove('show')" style="padding:12px 14px;background:rgba(255,68,68,.1);color:var(--red);border:none;border-radius:var(--rs);cursor:pointer">إلغاء</button>
    </div>
  </div>
</div>

<div class="ov" id="pov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl">💰 تسجيل دفعة</div>
    <div id="pcn" style="color:var(--text2);font-size:13px;margin-bottom:12px"></div>
    <label class="fl">المبلغ (دج)</label><input class="fi" type="number" id="pamt"/>
    <label class="fl">تاريخ الدفع</label><input class="fi" type="date" id="pdt"/>
    <label class="fl">ملاحظة</label><input class="fi" type="text" id="pnt" placeholder="تجديد 3 أشهر..."/>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="savePay()" style="flex:1;padding:12px;background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:800;font-size:14px">✅ تسجيل</button>
      <button onclick="document.getElementById('pov').classList.remove('show')" style="padding:12px 14px;background:rgba(255,68,68,.1);color:var(--red);border:none;border-radius:var(--rs);cursor:pointer">إلغاء</button>
    </div>
  </div>
</div>

<script>
var C = JSON.parse(localStorage.getItem('ibc') || '[]');
var V = 'dash', selId = null, dur = 1, lang = 'ar', filt = 'all', eid = null, mc = null, mtype = 'auto', salC = [], si = 0, payId = null;
var NEO_KEY = 'b63aafe7a06ae03389bfa709d36d99d1';
var NEO_API = 'https://4k.cms-only.ru/api/api.php';

var PKGS = [
  { server: 'Neo 4K', icon: '🌟', plans: [
    { dur: '1 شهر', price: 800, months: 1 },
    { dur: '3 أشهر', price: 1700, months: 3 },
    { dur: '6 أشهر', price: 2700, months: 6 },
    { dur: '12 شهر', price: 4200, months: 12 }
  ]},
  { server: 'Family 4K', icon: '👨‍👩‍👧‍👦', plans: [
    { dur: '6 أشهر', price: 1200, months: 6 },
    { dur: '12 شهر', price: 2200, months: 12 }
  ]}
];

function sv() { localStorage.setItem('ibc', JSON.stringify(C)); }

function toast(m) {
  var t = document.createElement('div');

  var s = new Date(), e = addM(s, dur);
  var durs = [1, 3, 6, 12];
  var db = durs.map(function(d) { return '<button class="db' + (dur === d ? ' on' : '') + '" onclick="setD(' + d + ')">' + (d === 1 ? 'شهر' : d === 12 ? 'سنة' : d + ' أشهر') + '</button>'; }).join('');
  var lf = [{ v: 'ar', l: '🇩🇿 عربي' }, { v: 'fr', l: '🇫🇷 Français' }, { v: 'en', l: '🇬🇧 English' }, { v: 'es', l: '🇪🇸 Español' }];
  var lb = lf.map(function(x) { return '<button class="lb' + (lang === x.v ? ' on' : '') + '" onclick="setL(\'' + x.v + '\',this)">' + x.l + '</button>'; }).join('');
  return '<div class="ttl">➕ زبون جديد</div>' +
    '<div class="neo-box"><div class="neo-t">⚡ استيراد من neo تلقائياً</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:8px">' +
    '<input class="fi" type="text" id="nu" placeholder="اليوزر" style="flex:1"/>' +
    '<input class="fi" type="text" id="np" placeholder="الباسورد" style="flex:1"/>' +
    '</div>' +
    '<button type="button" class="neo-btn" onclick="fetchNeo()">🔍 جلب من neo</button>' +
    '<div id="nst" style="font-size:12px;margin-top:7px;min-height:16px;text-align:center"></div></div>' +
    '<div class="fw">' +
    '<label class="fl" style="margin-top:0">اسم الزبون</label><input class="fi" type="text" id="fn" placeholder="أحمد بن علي"/>' +
    '<label class="fl">رقم الهاتف</label><input class="fi" type="text" id="fph" placeholder="+213 550 000 000"/>' +
    '<label class="fl">اسم الاشتراك / الباقة</label><input class="fi" type="text" id="fsn" placeholder="Gold IPTV"/>' +
    '<label class="fl">لغة الزبون 🌍</label><div style="display:flex;gap:6px;flex-wrap:wrap">' + lb + '</div>' +
    '<label class="fl">يوم الدفع الشهري (اختياري)</label><input class="fi" type="number" id="fpd" placeholder="مثال: 5" min="1" max="31"/>' +
    '<div class="cbox"><div class="cbox-t">🔐 بيانات الدخول (اختياري)</div>' +
    '<label class="fl" style="margin-top:0">رابط السيرفر</label><input class="fi" type="text" id="fsrv" placeholder="http://server.com:8080"/>' +
    '<label class="fl">اسم المستخدم</label><input class="fi" type="text" id="fus" placeholder="username"/>' +
    '<label class="fl">كلمة المرور</label>' +
    '<div style="position:relative"><input class="fi" type="password" id="fpw" placeholder="password" style="padding-left:40px"/>' +
    '<button type="button" onclick="tp()" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">👁</button></div></div>' +
    '<label class="fl">مدة الاشتراك</label><div class="dr">' + db + '</div>' +
    '<label class="fl">السعر (دج)</label><input class="fi" type="number" id="fpr" placeholder="1000"/>' +
    '<div class="prev">📅 البداية: <b>' + fd(s) + '</b><br>📅 النهاية: <b>' + fd(e) + '</b></div>' +
    '<button class="sbtn" onclick="addC()">✅ حفظ الاشتراك</button></div>';
}

function setD(d) { dur = d; render(); }
function setL(l, btn) {
  lang = l;
  document.querySelectorAll('.lb').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
}
function tp() { var i = document.getElementById('fpw'); i.type = i.type === 'password' ? 'text' : 'password'; }

async function fetchNeo() {
  var user = (document.getElementById('nu').value || '').trim();
  var pass = (document.getElementById('np').value || '').trim();
  var st = document.getElementById('nst');
  if (!user || !pass) { st.textContent = '⚠️ أدخل اليوزر والباسورد'; st.style.color = 'var(--orange)'; return; }
  st.textContent = '⏳ جاري الجلب...'; st.style.color = 'var(--text2)';
  try {
    var url = NEO_API + '?action=device_info&username=' + encodeURIComponent(user) + '&password=' + encodeURIComponent(pass) + '&api_key=' + NEO_KEY;
    var res = await fetch(url);
    var data = await res.json();
    var d = Array.isArray(data) ? data[0] : data;
    if (!d || d.status === 'false' || d.status === false) { st.textContent = '❌ لم يتم العثور على الزبون'; st.style.color = 'var(--red)'; return; }
    if (d.url) document.getElementById('fsrv').value = d.url;
    if (d.username) document.getElementById('fus').value = d.username;
    if (d.password) document.getElementById('fpw').value = d.password;
    if (d.username) document.getElementById('fsn').value = d.username;
    if (d.expire) {
      var exp = new Date(d.expire);
      var diff = Math.round((exp - new Date()) / (1000 * 60 * 60 * 24 * 30));
      if (diff > 0) { dur = Math.min(diff, 12); }
    }
    st.textContent = '✅ تم جلب البيانات! أكمل الاسم والهاتف واحفظ'; st.style.color = 'var(--green)';
  } catch(e) { st.textContent = '❌ تعذر الاتصال بـ neo'; st.style.color = 'var(--red)'; }
}

function addC() {
  var name = (document.getElementById('fn').value || '').trim();
  var phone = (document.getElementById('fph').value || '').trim();
  var sub = (document.getElementById('fsn').value || '').trim();
  var payDay = parseInt(document.getElementById('fpd').value) || null;
  var srv = (document.getElementById('fsrv').value || '').trim();
  var us = (document.getElementById('fus').value || '').trim();
  var pw = (document.getElementById('fpw').value || '').trim();
  var pr = Number(document.getElementById('fpr').value) || 0;
  if (!name || !phone) { alert('الرجاء إدخال الاسم ورقم الهاتف'); return; }
  var s = new Date(), e = addM(s, dur);
  var pl = dur === 1 ? '1 شهر' : dur === 12 ? '12 شهر' : dur + ' أشهر';
  C.unshift({ id: Date.now(), name: name, phone: phone, subName: sub, server: srv, username: us, password: pw, lang: lang, plan: pl, payDay: payDay, payments: [], startDate: s.toISOString().split('T')[0], endDate: e.toISOString().split('T')[0], price: pr });
  sv(); filt = 'all'; dur = 1; lang = 'ar';
  toast('✅ تم إضافة ' + name + '!'); go('list');
}

function openDet(id) { selId = id; V = 'det'; render(); }

function rDet() {
  var c = C.find(function(x) { return x.id === selId; });
  if (!c) return '<div class="empty">غير موجود</div>';
  var d = dl(c.endDate);
  var lf = { ar: '🇩🇿 عربي', fr: '🇫🇷 Français', en: '🇬🇧 English', es: '🇪🇸 Español' };
  var cred = '';
  if (c.server || c.username || c.password) {
    cred = '<div style="background:var(--bg);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);padding:12px;margin-top:8px">' +
      '<div style="color:var(--blue);font-size:12px;font-weight:700;margin-bottom:8px">🔐 بيانات الدخول</div>' +
      (c.server ? '<div class="crow"><span style="color:var(--text3)">🌐 السيرفر</span><div class="cvals"><span class="cv">' + c.server + '</span><button class="cpb" onclick="cpTxt(\'' + c.server.replace(/'/g, "\\'") + '\',this)">📋</button></div></div>' : '') +
      (c.username ? '<div class="crow"><span style="color:var(--text3)">👤 اليوزر</span><div class="cvals"><span class="cv">' + c.username + '</span><button class="cpb" onclick="cpTxt(\'' + c.username.replace(/'/g, "\\'") + '\',this)">📋</button></div></div>' : '') +
      (c.password ? '<div class="crow"><span style="color:var(--text3)">🔑 الباسورد</span><div class="cvals"><span class="cv" id="pv' + c.id + '">••••••••</span><button class="cpb" onclick="tpv(' + c.id + ',\'' + c.password.replace(/'/g, "\\'") + '\')">👁</button><button class="cpb" onclick="cpTxt(\'' + c.password.replace(/'/g, "\\'") + '\',this)">📋</button></div></div>' : '') +
      '<button onclick="sendCred(' + c.id + ')" style="width:100%;margin-top:8px;padding:9px;background:rgba(59,139,255,.1);color:var(--blue);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:700">📩 إرسال بيانات الدخول</button></div>';
  }
  var pays = c.payments || [];
  var ph = pays.length ? '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-top:8px">' +
    '<div style="color:var(--green);font-size:12px;font-weight:700;margin-bottom:8px">💰 سجل الدفعات (' + pays.length + ')</div>' +
    pays.slice(-5).reverse().map(function(p) { return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px"><div style="font-weight:600">' + p.amount.toLocaleString() + ' دج' + (p.note ? ' — ' + p.note : '') + '</div><div style="color:var(--text3)">' + fds(p.date) + '</div></div>'; }).join('') + '</div>' : '';

  return '<button class="bk" onclick="go(\'list\')">← رجوع</button>' +
    '<div class="dh">' +
    '<div class="dav" style="background:' + avc(c.name) + '">' + c.name[0] + '</div>' +
    '<div class="dn">' + c.name + '</div>' +
    '<div class="dp">📞 ' + c.phone + '</div>' +
    '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">' + (lf[c.lang || 'ar'] || '🇩🇿 عربي') + (c.payDay ? ' | 💰 يوم الدفع: ' + c.payDay : '') + '</div>' +
    bdg(d) +
    '<div class="dgrid">' +
    '<div class="di"><span class="di-l">📦 الباقة</span><b>' + c.plan + '</b></div>' +
    (c.subName ? '<div class="di" style="grid-column:span 2"><span class="di-l">🏷️ الاشتراك</span><b>' + c.subName + '</b></div>' : '') +
    '<div class="di"><span class="di-l">📅 البداية</span><b>' + fd(c.startDate) + '</b></div>' +
    '<div class="di"><span class="di-l">📅 النهاية</span><b>' + fd(c.endDate) + '</b></div>' +
    '<div class="di"><span class="di-l">⏳ الأيام</span><b style="color:' + (d < 0 ? 'var(--red)' : d <= 7 ? 'var(--orange)' : 'var(--green)') + '">' + (d > 0 ? d + ' يوم' : d === 0 ? 'ينتهي اليوم!' : 'منتهي') + '</b></div>' +
    '<div class="di"><span class="di-l">💰 السعر</span><b>' + (c.price || 0).toLocaleString() + ' دج</b></div>' +
    '</div>' + cred + ph +
    '<div class="dacts">' +
    '<button class="bwa" onclick="openModal(' + c.id + ')">📩 واتساب</button>' +
    '<button class="bedit" onclick="openEdit(' + c.id + ')">✏️ تعديل</button>' +
    '<button class="bdel" onclick="delC(' + c.id + ')">🗑</button>' +
    '</div>' +
    (d < 0 ? '<button class="bren" onclick="renew(' + c.id + ')">🔄 تجديد الاشتراك</button>' : '') +
    '<button class="bpay" onclick="openPay(' + c.id + ')">💰 تسجيل دفعة</button>' +
    '</div>';
}

function tpv(id, pw) { var el = document.getElementById('pv' + id); if (el) el.textContent = el.textContent === '••••••••' ? pw : '••••••••'; }

function sendCred(id) {
  var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  var sub = c.subName || 'IPTV';
  var msgs = {
    ar: 'السلام عليكم ' + c.name + ' 👋\n\n✅ تم تفعيل اشتراكك في ' + sub + '\n\n🔐 بيانات الدخول:\n🌐 ' + (c.server || '-') + '\n👤 ' + (c.username || '-') + '\n🔑 ' + (c.password || '-') + '\n\n📅 ينتهي: ' + fd(c.endDate) + '\n\n— Islam Box Tech Zeboudja',
    fr: 'Bonjour ' + c.name + ' 👋\n\n✅ Abonnement ' + sub + ' activé!\n🌐 ' + (c.server || '-') + '\n👤 ' + (c.username || '-') + '\n🔑 ' + (c.password || '-') + '\n📅 Expire: ' + fd(c.endDate) + '\n\n— Islam Box Tech Zeboudja',
    en: 'Hello ' + c.name + ' 👋\n\n✅ Your ' + sub + ' subscription is active!\n🌐 ' + (c.server || '-') + '\n👤 ' + (c.username || '-') + '\n🔑 ' + (c.password || '-') + '\n📅 Expires: ' + fd(c.endDate) + '\n\n— Islam Box Tech Zeboudja',
    es: 'Hola ' + c.name + ' 👋\n\n✅ Tu suscripción ' + sub + ' está activa!\n🌐 ' + (c.server || '-') + '\n👤 ' + (c.username || '-') + '\n🔑 ' + (c.password || '-') + '\n📅 Vence: ' + fd(c.endDate) + '\n\n— Islam Box Tech Zeboudja'
  };
  window.open(wl(c.phone, msgs[c.lang || 'ar'] || msgs.ar), '_blank');
}

function delC(id) {
  if (!confirm('هل تريد حذف هذا الزبون؟')) return;
  C = C.filter(function(c) { return c.id !== id; }); sv(); toast('🗑️ تم الحذف'); go('list');
}

function renew(id) {
  var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  var m = parseInt(prompt('كم شهراً للتجديد؟', '1')); if (isNaN(m) || m < 1) return;
  var e = addM(new Date(), m);
  c.endDate = e.toISOString().split('T')[0]; c.startDate = new Date().toISOString().split('T')[0];
  c.plan = m === 1 ? '1 شهر' : m === 12 ? '12 شهر' : m + ' أشهر';
  sv(); toast('✅ تم التجديد!'); render();
}

function openEdit(id) {
  eid = id; var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  document.getElementById('en').value = c.name;
  document.getElementById('ep').value = c.phone;
  document.getElementById('es').value = c.subName || '';
  document.getElementById('epr').value = c.price || 0;
  document.getElementById('eed').value = c.endDate;
  document.getElementById('epd').value = c.payDay || '';
  document.getElementById('esrv').value = c.server || '';
  document.getElementById('eu').value = c.username || '';
  document.getElementById('epw').value = c.password || '';
  document.getElementById('eov').classList.add('show');
}

function saveEdit() {
  var c = C.find(function(x) { return x.id === eid; }); if (!c) return;
  c.name = document.getElementById('en').value.trim();
  c.phone = document.getElementById('ep').value.trim();
  c.subName = document.getElementById('es').value.trim();
  c.price = Number(document.getElementById('epr').value) || 0;
  c.endDate = document.getElementById('eed').value;
  c.payDay = parseInt(document.getElementById('epd').value) || null;
  c.server = document.getElementById('esrv').value.trim();
  c.username = document.getElementById('eu').value.trim();
  c.password = document.getElementById('epw').value.trim();
  sv(); document.getElementById('eov').classList.remove('show');
  toast('✅ تم حفظ التعديلات!'); render();
}

function openPay(id) {
  payId = id; var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  document.getElementById('pcn').textContent = '👤 ' + c.name + ' — ' + c.phone;
  document.getElementById('pamt').value = c.price || '';
  document.getElementById('pdt').value = new Date().toISOString().split('T')[0];
  document.getElementById('pnt').value = '';
  document.getElementById('pov').classList.add('show');
}

function savePay() {
  var c = C.find(function(x) { return x.id === payId; }); if (!c) return;
  var amount = Number(document.getElementById('pamt').value) || 0;
  var date = document.getElementById('pdt').value;
  var note = document.getElementById('pnt').value.trim();
  if (!amount) { alert('أدخل المبلغ'); return; }
  if (!c.payments) c.payments = [];
  c.payments.push({ amount: amount, date: date, note: note });
  sv(); document.getElementById('pov').classList.remove('show');
  toast('✅ تم تسجيل الدفعة — ' + amount.toLocaleString() + ' دج'); render();
}

function openModal(id) {
  mc = C.find(function(x) { return x.id === id; }); if (!mc) return;
  mtype = 'auto';
  document.querySelectorAll('.mt').forEach(function(b) { b.classList.remove('on'); });
  document.querySelector('.mt').classList.add('on');
  document.getElementById('mttl').textContent = '📩 رسالة — ' + mc.name;
  updM(); document.getElementById('ov').classList.add('show');
}

function updM() {
  var t = mtype === 'auto' ? null : mtype;
  var msg = wMsg(mc, t);
  document.getElementById('mta').value = msg;
  document.getElementById('mwal').href = wl(mc.phone, msg);
}

function setMT(btn, t) {
  mtype = t;
  document.querySelectorAll('.mt').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on'); updM();
}

function cpyMsg() {
  navigator.clipboard.writeText(document.getElementById('mta').value).then(function() {
    var b = document.querySelector('.mcopy'); b.textContent = '✅ تم!';
    setTimeout(function() { b.textContent = '📋 نسخ'; }, 2000);
  });
}

function expBk() {
  var blob = new Blob([JSON.stringify(C, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'islambox-' + new Date().toISOString().split('T')[0] + '.json';
  a.click(); URL.revokeObjectURL(url); toast('✅ تم تصدير النسخة الاحتياطية!');
}

function impBk(e) {
  var file = e.target.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      if (!Array.isArray(d)) throw 0;
      if (confirm('استيراد ' + d.length + ' زبون؟')) { C = d; sv(); render(); toast('✅ تم الاستيراد — ' + d.length + ' زبون'); }
    } catch(err) { alert('❌ ملف غير صحيح!'); }
  };
  r.readAsText(file); e.target.value = '';
}

function checkSt() {
  var today = new Date().toDateString();
  if (localStorage.getItem('lc') === today) return;
  localStorage.setItem('lc', today);
  salC = C.filter(function(c) { var d = dl(c.endDate); return d >= 0 && d <= 3; });
  if (!salC.length) return;
  document.getElementById('sal-list').innerHTML = salC.map(function(c) {
    var d = dl(c.endDate);
    return '<div class="sal-row"><span><b>' + c.name + '</b><br><span style="color:var(--text3);font-size:10px">📞 ' + c.phone + (c.subName ? ' — ' + c.subName : '') + '</span></span>' +
      '<div style="display:flex;gap:5px;align-items:center"><span class="bWN">' + d + ' أيام</span>' +
      '<a class="hdr-btn" href="' + wl(c.phone, wMsg(c, 'reminder')) + '" target="_blank" style="text-decoration:none;font-size:12px">📩</a></div></div>';
  }).join('');
  document.getElementById('sal').classList.add('show');
}

function sendAll() {
  if (si >= salC.length) { document.getElementById('sal').classList.remove('show'); si = 0; return; }
  window.open(wl(salC[si].phone, wMsg(salC[si], 'reminder')), '_blank'); si++;
  if (si < salC.length) setTimeout(sendAll, 1500);
  else setTimeout(function() { document.getElementById('sal').classList.remove('show'); si = 0; }, 1000);
}

render(); checkSt();
</script>
</body>
</html>
