<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Islam Box Tech</title>
<style>
:root{--bg:#060d1a;--bg2:#0b1525;--bg3:#0f1d30;--border:#1a3050;--blue:#3b8bff;--blue2:#1a5fe0;--green:#00e676;--orange:#ff9100;--red:#ff4444;--purple:#c084fc;--text:#e8f0fe;--text2:#8aa4c8;--text3:#4a6480;--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;min-height:100vh}
input,select,textarea,button{font-family:inherit;direction:rtl;outline:none}
#hdr{background:#0a1628;border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:800}
.logo-sub{font-size:10px;color:var(--text3)}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);padding:7px 9px;cursor:pointer;font-size:14px}
nav{display:flex;border-top:1px solid var(--border);margin:0 -14px}
.nb{flex:1;padding:9px 2px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;margin-bottom:-1px}
.nb span{font-size:16px}
.nb.on{color:var(--blue);border-bottom-color:var(--blue)}
#pg{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.ttl{font-size:18px;font-weight:800;margin-bottom:14px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.st{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer}
.sl{height:2px;margin:-14px -14px 10px;border-radius:var(--r) var(--r) 0 0}
.si2{font-size:22px;margin-bottom:4px}
.sv{font-size:24px;font-weight:900}
.slb{font-size:10px;color:var(--text3);margin-top:2px}
.sw{grid-column:span 2}
.al{border-radius:var(--r);padding:12px;margin-bottom:12px;border:1px solid}
.al-w{background:rgba(255,145,0,.08);border-color:rgba(255,145,0,.3)}
.al-e{background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3)}
.at{font-size:13px;font-weight:700;margin-bottom:8px}
.al-w .at{color:var(--orange)}
.al-e .at{color:var(--red)}
.ar{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.ar:last-child{border-bottom:none}
.bOK{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bWN{background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bEX{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bPD{background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bVIP{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bST{background:rgba(6,182,212,.1);color:#06b6d4;border:1px solid rgba(6,182,212,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.lhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.abtn{background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);padding:9px 16px;cursor:pointer;font-weight:700;font-size:12px}
.srow{display:flex;gap:8px;margin-bottom:12px}
.sinp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:13px}
.sinp:focus{border-color:var(--blue)}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--text);font-size:12px}
.empty{text-align:center;color:var(--text3);padding:50px 20px;font-size:15px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;cursor:pointer}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.cn{font-weight:700;font-size:14px}
.cp2{font-size:11px;color:var(--text3);margin-top:2px}
.cb{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);border-top:1px solid var(--border);padding-top:7px;flex-wrap:wrap;gap:4px}
.fw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.fl{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:12px;font-weight:600}
.fl:first-child{margin-top:0}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px 12px;color:var(--text);font-size:14px}
.fi:focus{border-color:var(--blue)}
select.fi{cursor:pointer}
.dr{display:flex;gap:6px;flex-wrap:wrap}
.db{flex:1;min-width:55px;padding:10px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:12px;text-align:center}
.db.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.lb{flex:1;min-width:65px;padding:9px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:11px;text-align:center}
.lb.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.prev{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:2}
.sbtn{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:15px;font-weight:800}
.cbox{background:var(--bg);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);padding:12px;margin-top:12px}
.cbox-t{color:var(--blue);font-size:12px;font-weight:700;margin-bottom:8px}
.nbox{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.nbox-t{color:var(--purple);font-size:13px;font-weight:700;margin-bottom:10px}
.nbtn{width:100%;margin-top:8px;padding:10px;background:linear-gradient(135deg,#6d28d9,var(--blue2));color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;padding:8px 14px;font-weight:600}
.dh{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px}
.dav{width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 10px}
.dn{font-size:20px;font-weight:800}
.dph{color:var(--text3);font-size:13px;margin:4px 0 10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.di{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.di-l{color:var(--text3)}
.dacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.bwa{flex:1;padding:11px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bed{flex:1;padding:11px;background:rgba(59,139,255,.1);color:var(--blue);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bdl{padding:11px 14px;background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.brn{width:100%;margin-top:7px;padding:11px;background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.brw{width:100%;margin-top:7px;padding:11px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bpy{width:100%;margin-top:7px;padding:11px;background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px}
.crow:last-of-type{border-bottom:none}
.cvals{display:flex;align-items:center;gap:5px;max-width:65%}
.cv{font-family:monospace;font-size:11px;word-break:break-all}
.cpb{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:3px 7px;font-size:11px}
.pay-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ps3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.ps{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;text-align:center}
.ps-v{font-size:18px;font-weight:900;margin-bottom:2px}
.ps-l{font-size:10px;color:var(--text3)}
.cat-t{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;padding:8px 12px;background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs)}
.pkg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.pkg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pkg-n{font-size:14px;font-weight:800}
.pkg-pr{font-size:18px;font-weight:900;color:var(--green)}
.pkg-d{font-size:11px;color:var(--text3)}
.pkg-btns{display:flex;gap:7px}
.pb{flex:1;padding:9px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:700;border:1px solid;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
.pb-c{background:rgba(59,139,255,.1);color:var(--blue);border-color:rgba(59,139,255,.3)}
.pb-w{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.3)}
.tmpl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px}
.tmpl-t{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}
.tmpl-p{font-size:11px;color:var(--text3);line-height:1.7;margin-bottom:10px;background:var(--bg);border-radius:6px;padding:8px;max-height:70px;overflow:hidden}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mttl{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--blue)}
.mta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px;color:var(--text);font-size:12px;line-height:1.9;resize:none}
.mt-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.mt{flex:1;min-width:60px;padding:7px 4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:10px;text-align:center}
.mt.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.macts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.mc{flex:1;padding:10px;background:rgba(59,139,255,.15);color:var(--blue);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.mw{flex:1;padding:10px;background:rgba(0,230,118,.1);color:var(--green);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
.mx{padding:10px 14px;background:rgba(255,68,68,.1);color:var(--red);border:none;border-radius:var(--rs);cursor:pointer}
#sal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;padding:14px}
#sal.show{display:flex}
.sal-box{background:var(--bg2);border:2px solid rgba(255,145,0,.5);border-radius:16px;padding:18px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.sal-t{font-size:16px;font-weight:800;color:var(--orange);margin-bottom:12px;text-align:center}
.sal-r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;font-size:12px}
.sal-r:last-of-type{border-bottom:none}
.sal-f{display:flex;gap:7px;margin-top:12px}
.sal-a{flex:1;padding:12px;background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:800;font-size:13px}
.sal-s{padding:12px 14px;background:var(--bg);color:var(--text3);border:none;border-radius:var(--rs);cursor:pointer}
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:2000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
@media print{#hdr,#sal,.ov,.bk,.dacts,.abtn{display:none!important}body{background:#fff;color:#000}.cc,.dh{border:1px solid #ddd;background:#fff}}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-top">
    <div class="logo-wrap">
      <div class="logo-icon">📺</div>
      <div><div class="logo-text">Islam Box Tech</div><div class="logo-sub">Zeboudja — إدارة الاشتراكات</div></div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="expBk()">💾</button>
      <button class="hdr-btn" onclick="document.getElementById('impf').click()">📥</button>
      <input type="file" id="impf" accept=".json" style="display:none" onchange="impBk(event)"/>
    </div>
  </div>
  <nav>
    <button class="nb on" onclick="go('dash')"><span>🏠</span>الرئيسية</button>
    <button class="nb" onclick="go('list')"><span>👥</span>الزبائن</button>
    <button class="nb" onclick="go('pay')"><span>💰</span>الدفعات</button>
    <button class="nb" onclick="go('cat')"><span>📦</span>الكتالوج</button>
    <button class="nb" onclick="go('add')"><span>➕</span>جديد</button>
  </nav>
</div>
<div id="pg"></div>

<div id="sal">
  <div class="sal-box">
    <div class="sal-t">🔔 اشتراكات تنتهي قريباً!</div>
    <div id="sal-list"></div>
    <div class="sal-f">
      <button class="sal-a" onclick="sendAll()">📩 إرسال للكل</button>
      <button class="sal-s" onclick="document.getElementById('sal').classList.remove('show')">تجاوز</button>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl" id="mttl"></div>
    <div class="mt-row">
      <button class="mt on" onclick="setMT(this,'auto')">🔄 تلقائي</button>
      <button class="mt" onclick="setMT(this,'reminder')">⚠️ تذكير</button>
      <button class="mt" onclick="setMT(this,'expired')">❌ منتهي</button>
      <button class="mt" onclick="setMT(this,'active')">✅ نشط</button>
    </div>
    <textarea class="mta" id="mta" rows="8"></textarea>
    <div class="macts">
      <button class="mc" onclick="cpyMsg()">📋 نسخ</button>
      <a class="mw" id="mwal" href="#" target="_blank">💬 واتساب</a>
      <button class="mx" onclick="document.getElementById('ov').classList.remove('show')">✕</button>
    </div>
  </div>
</div>

<div class="ov" id="eov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl">✏️ تعديل الزبون</div>
    <label class="fl">الاسم</label><input class="fi" type="text" id="en"/>
    <label class="fl">رقم الهاتف</label><input class="fi" type="text" id="ep"/>
    <label class="fl">اسم الاشتراك</label><input class="fi" type="text" id="ess"/>
    <label class="fl">السعر (دج)</label><input class="fi" type="number" id="epr"/>
    <label class="fl">تاريخ الانتهاء</label><input class="fi" type="date" id="eed"/>
    <label class="fl">يوم الدفع الشهري</label><input class="fi" type="number" id="epd" min="1" max="31"/>
    <label class="fl">نوع الاشتراك</label>
    <select class="fi" id="est">
      <option value="code">📱 كود</option>
      <option value="m3u">📋 M3U</option>
      <option value="mag">📺 MAG</option>
      <option value="stalker">🔌 Stalker</option>
    </select>
    <label class="fl">تصنيف الزبون</label>
    <select class="fi" id="ecat">
      <option value="normal">👤 عادي</option>
      <option value="vip">⭐ VIP</option>
      <option value="problem">⚠️ مشكل في الدفع</option>
    </select>
    <label class="fl">رابط السيرفر</label><input class="fi" type="text" id="esrv"/>
    <label class="fl">رابط M3U المباشر</label><input class="fi" type="text" id="em3u" placeholder="http://..."/>
    <label class="fl">اسم المستخدم</label><input class="fi" type="text" id="eu"/>
    <label class="fl">كلمة المرور</label><input class="fi" type="text" id="epw"/>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="saveEdit()" style="flex:1;padding:12px;background:linear-gradient(135deg,#1a5fe0,#6d28d9);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:800;font-size:14px">✅ حفظ</button>
      <button onclick="document.getElementById('eov').classList.remove('show')" style="padding:12px 14px;background:rgba(255,68,68,.1);color:#ff4444;border:none;border-radius:8px;cursor:pointer">إلغاء</button>
    </div>
  </div>
</div>

<div class="ov" id="pov" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mttl">💰 تسجيل دفعة</div>
    <div id="pcn" style="color:#8aa4c8;font-size:13px;margin-bottom:12px"></div>
    <label class="fl">المبلغ (دج)</label><input class="fi" type="number" id="pamt"/>
    <label class="fl">تاريخ الدفع</label><input class="fi" type="date" id="pdt"/>
    <label class="fl">ملاحظة</label><input class="fi" type="text" id="pnt" placeholder="تجديد 3 أشهر..."/>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="savePay()" style="flex:1;padding:12px;background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:800;font-size:14px">✅ تسجيل</button>
      <button onclick="document.getElementById('pov').classList.remove('show')" style="padding:12px 14px;background:rgba(255,68,68,.1);color:#ff4444;border:none;border-radius:8px;cursor:pointer">إلغاء</button>
    </div>
  </div>
</div>

<script>
var C = JSON.parse(localStorage.getItem('ibc') || '[]');
var V = 'dash', selId = null, dur = 1, lang = 'ar', filt = 'all', eid = null;
var mc = null, mtype = 'auto', salC = [], si = 0, payId = null;
var subType = 'code', clientCat = 'normal';
var _cred = {};

var PKGS = [
  { server: 'Neo 4K', icon: '🌟', plans: [
    { dur: '1 شهر', price: 800, months: 1 },
    { dur: '3 أشهر', price: 1700, months: 3 },
    { dur: '6 أشهر', price: 2700, months: 6 },
    { dur: '12 شهر', price: 4200, months: 12 }
  ]},
  { server: 'Family 4K', icon: '👨‍👩‍👧‍👦', plans: [
    { dur: '6 أشهر', price: 1200, months: 6 },
    { dur: '12 شهر', price: 2200, months: 12 }
  ]}
];

function sv() { localStorage.setItem('ibc', JSON.stringify(C)); }
function getPkgs() { return JSON.parse(localStorage.getItem('ibc_pkgs') || 'null') || PKGS; }
function savePkgs(p) { localStorage.setItem('ibc_pkgs', JSON.stringify(p)); PKGS = p; }

function toast(m) {
  var t = document.createElement('div');
  t.className = 'toast'; t.textContent = m;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}

function wl(p, m) { return 'https://wa.me/' + p.replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent(m); }
function addM(d, m) { var x = new Date(d); x.setMonth(x.getMonth() + m); return x; }
function dl(e) { return Math.ceil((new Date(e) - new Date()) / 86400000); }
function fd(d) { return new Date(d).toLocaleDateString('ar-DZ', { year: 'numeric', month: 'long', day: 'numeric' }); }
function fds(d) { return new Date(d).toLocaleDateString('ar-DZ', { month: 'short', day: 'numeric' }); }
function avc(n) { var c = ['#1e40af','#065f46','#7c3aed','#b45309','#be185d','#0e7490']; return c[n.charCodeAt(0) % c.length]; }
function payDue(c) { if (!c.payDay) return false; var d = c.payDay - new Date().getDate(); return d >= 0 && d <= 3; }

function bdg(d) {
  if (d < 0) return '<span class="bEX">منتهي</span>';
  if (d <= 7) return '<span class="bWN">⚠ ' + d + ' أيام</span>';
  return '<span class="bOK">✓ نشط</span>';
}

function typeLabel(c) {
  var t = c.subType || 'code';
  if (t === 'code') return '<span class="bOK">📱 كود</span>';
  if (t === 'm3u') return '<span class="bPD">📋 M3U</span>';
  if (t === 'mag') return '<span class="bWN">📺 MAG</span>';
  if (t === 'stalker') return '<span class="bST">🔌 Stalker</span>';
  return '<span class="bOK">📱 كود</span>';
}

function catLabel(c) {
  var cat = c.category || 'normal';
  if (cat === 'vip') return ' <span class="bVIP">⭐ VIP</span>';
  if (cat === 'problem') return ' <span class="bEX">⚠️ مشكل</span>';
  return '';
}

function buildMsg(parts) { return parts.join('\n'); }

var MSGS = {
  ar: {
    r: function(n, s, d, dt) { return buildMsg(['السلام عليكم ' + n + ' 👋', '', 'تنبيه هام ⚠️', 'اشتراكك' + s + ' سينتهي خلال ' + d + ' أيام!', '📅 تاريخ الانتهاء: ' + dt, '', 'جدد الآن 📺💰', '', '— Islam Box Tech Zeboudja']); },
    e: function(n, s, dt) { return buildMsg(['السلام عليكم ' + n + ' 👋', '', 'اشتراكك' + s + ' قد انتهى ❌', '📅 انتهى: ' + dt, '', 'تواصل معنا للتجديد 💰', '', '— Islam Box Tech Zeboudja']); },
    a: function(n, s, dt) { return buildMsg(['السلام عليكم ' + n + ' 👋', '', 'شكراً على ثقتك 🙏', 'اشتراكك' + s + ' نشط ✅', '📅 ينتهي: ' + dt, '', '— Islam Box Tech Zeboudja']); },
    p: function(n, day) { return buildMsg(['السلام عليكم ' + n + ' 👋', '', 'تذكير بالدفع 💰', 'موعد تجديد اشتراكك يوم ' + day + ' من الشهر', '', 'تواصل معنا مسبقاً 😊', '', '— Islam Box Tech Zeboudja']); },
    renew: function(n, s, pl, dt) { return buildMsg(['السلام عليكم ' + n + ' 👋', '', '✅ تم تجديد اشتراكك' + s + ' لمدة ' + pl, '📅 ينتهي: ' + dt, '', 'شكراً على ثقتك 🙏', '— Islam Box Tech Zeboudja']); }
  },
  fr: {
    r: function(n, s, d, dt) { return buildMsg(['Bonjour ' + n + ' 👋', '', 'Rappel ⚠️', 'Votre abonnement' + s + ' expire dans ' + d + ' jours!', '📅 ' + dt, '', 'Renouvelez maintenant 📺💰', '', '— Islam Box Tech Zeboudja']); },
    e: function(n, s, dt) { return buildMsg(['Bonjour ' + n + ' 👋', '', 'Votre abonnement' + s + ' a expiré ❌', '📅 ' + dt, '', 'Contactez-nous 💰', '', '— Islam Box Tech Zeboudja']); },
    a: function(n, s, dt) { return buildMsg(['Bonjour ' + n + ' 👋', '', 'Merci 🙏', 'Votre abonnement' + s + ' est actif ✅', '📅 ' + dt, '', '— Islam Box Tech Zeboudja']); },
    p: function(n, day) { return buildMsg(['Bonjour ' + n + ' 👋', '', 'Rappel de paiement 💰', 'Renouvellement le ' + day + ' du mois', '', '— Islam Box Tech Zeboudja']); },
    renew: function(n, s, pl, dt) { return buildMsg(['Bonjour ' + n + ' 👋', '', '✅ Abonnement' + s + ' renouvelé pour ' + pl, '📅 Expire: ' + dt, '', 'Merci 🙏', '— Islam Box Tech Zeboudja']); }
  },
  en: {
    r: function(n, s, d, dt) { return buildMsg(['Hello ' + n + ' 👋', '', 'Reminder ⚠️', 'Your subscription' + s + ' expires in ' + d + ' days!', '📅 ' + dt, '', 'Renew now 📺💰', '', '— Islam Box Tech Zeboudja']); },
    e: function(n, s, dt) { return buildMsg(['Hello ' + n + ' 👋', '', 'Your subscription' + s + ' expired ❌', '📅 ' + dt, '', 'Contact us 💰', '', '— Islam Box Tech Zeboudja']); },
    a: function(n, s, dt) { return buildMsg(['Hello ' + n + ' 👋', '', 'Thank you 🙏', 'Your subscription' + s + ' is active ✅', '📅 ' + dt, '', '— Islam Box Tech Zeboudja']); },
    p: function(n, day) { return buildMsg(['Hello ' + n + ' 👋', '', 'Payment reminder 💰', 'Renewal due on day ' + day, '', '— Islam Box Tech Zeboudja']); },
    renew: function(n, s, pl, dt) { return buildMsg(['Hello ' + n + ' 👋', '', '✅ Subscription' + s + ' renewed for ' + pl, '📅 Expires: ' + dt, '', 'Thank you 🙏', '— Islam Box Tech Zeboudja']); }
  },
  es: {
    r: function(n, s, d, dt) { return buildMsg(['Hola ' + n + ' 👋', '', 'Recordatorio ⚠️', 'Tu suscripción' + s + ' vence en ' + d + ' días!', '📅 ' + dt, '', 'Renueva ahora 📺💰', '', '— Islam Box Tech Zeboudja']); },
    e: function(n, s, dt) { return buildMsg(['Hola ' + n + ' 👋', '', 'Tu suscripción' + s + ' expiró ❌', '📅 ' + dt, '', 'Contáctanos 💰', '', '— Islam Box Tech Zeboudja']); },
    a: function(n, s, dt) { return buildMsg(['Hola ' + n + ' 👋', '', 'Gracias 🙏', 'Tu suscripción' + s + ' está activa ✅', '📅 ' + dt, '', '— Islam Box Tech Zeboudja']); },
    p: function(n, day) { return buildMsg(['Hola ' + n + ' 👋', '', 'Recordatorio de pago 💰', 'Renovación el día ' + day, '', '— Islam Box Tech Zeboudja']); },
    renew: function(n, s, pl, dt) { return buildMsg(['Hola ' + n + ' 👋', '', '✅ Suscripción' + s + ' renovada por ' + pl, '📅 Vence: ' + dt, '', 'Gracias 🙏', '— Islam Box Tech Zeboudja']); }
  }
};

function wMsg(c, type) {
  var d = dl(c.endDate), sub = c.subName ? ' (' + c.subName + ')' : '';
  var m = MSGS[c.lang || 'ar'] || MSGS.ar, dt = fd(c.endDate);
  if (type === 'reminder' || (!type && d >= 0 && d <= 7)) return m.r(c.name, sub, d, dt);
  if (type === 'expired' || (!type && d < 0)) return m.e(c.name, sub, dt);
  if (type === 'pay') return m.p(c.name, c.payDay || '');
  return m.a(c.name, sub, dt);
}

function go(v) {
  V = v;
  document.querySelectorAll('.nb').forEach(function(b, i) {
    b.classList.toggle('on', ['dash','list','pay','cat','add'][i] === v);
  });
  render();
}

function render() {
  var el = document.getElementById('pg');
  if (V === 'dash') el.innerHTML = rDash();
  else if (V === 'list') el.innerHTML = rList();
  else if (V === 'pay') el.innerHTML = rPay();
  else if (V === 'cat') el.innerHTML = rCat();
  else if (V === 'mcat') el.innerHTML = rMCat();
  else if (V === 'add') el.innerHTML = rAdd();
  else if (V === 'det') el.innerHTML = rDet();
  else if (V === 'report') el.innerHTML = rReport();
}

function rDash() {
  var exp = C.filter(function(c) { var d = dl(c.endDate); return d >= 0 && d <= 7; });
  var expd = C.filter(function(c) { return dl(c.endDate) < 0; });
  var act = C.filter(function(c) { return dl(c.endDate) > 7; });
  var rev = C.reduce(function(s, c) { return s + (c.price || 0); }, 0);
  var due = C.filter(function(c) { return payDue(c); });
  var mn = new Date().getMonth(), yr = new Date().getFullYear();
  var mRev = C.reduce(function(s, c) {
    return s + (c.payments || []).filter(function(p) { var d = new Date(p.date); return d.getMonth() === mn && d.getFullYear() === yr; }).reduce(function(a, p) { return a + p.amount; }, 0);
  }, 0);
  var plans = {};
  C.forEach(function(c) { var p = c.subName || c.plan || 'أخرى'; plans[p] = (plans[p] || 0) + 1; });
  var sp = Object.entries(plans).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 4);
  var mx = sp[0] ? sp[0][1] : 1;
  var chart = sp.length ? '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px">📦 توزيع الباقات</div>' +
    sp.map(function(x) { return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11px"><div style="width:75px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left">' + x[0].substring(0, 10) + '</div><div style="flex:1;background:var(--bg);border-radius:20px;height:8px;overflow:hidden"><div style="height:100%;border-radius:20px;background:linear-gradient(90deg,var(--blue),var(--purple));width:' + (x[1] / mx * 100) + '%"></div></div><div style="width:28px;text-align:right;font-weight:700;color:var(--blue)">' + x[1] + '</div></div>'; }).join('') + '</div>' : '';

  var alerts = '';
  if (due.length) {
    alerts += '<div class="al al-w"><div class="at">💰 موعد الدفع قريب (' + due.length + ')</div>';
    due.forEach(function(c) { alerts += '<div class="ar"><span><b>' + c.name + '</b> — يوم ' + c.payDay + '</span><div style="display:flex;gap:5px"><span class="bPD">يوم ' + c.payDay + '</span><button class="hdr-btn" style="padding:4px 8px;font-size:11px" onclick="openPay(' + c.id + ')">💰</button></div></div>'; });
    alerts += '</div>';
  }
  if (exp.length) {
    alerts += '<div class="al al-w"><div class="at">⚠️ تنتهي خلال 7 أيام</div>';
    exp.forEach(function(c) { alerts += '<div class="ar"><span><b>' + c.name + '</b><br><span style="color:var(--text3);font-size:10px">📞 ' + c.phone + '</span></span><div style="display:flex;gap:5px;align-items:center">' + bdg(dl(c.endDate)) + '<button class="hdr-btn" style="padding:4px 8px;font-size:11px" onclick="openModal(' + c.id + ')">📩</button></div></div>'; });
    alerts += '</div>';
  }
  if (expd.length) {
    alerts += '<div class="al al-e"><div class="at">❌ منتهية (' + expd.length + ')</div>';
    expd.slice(0, 5).forEach(function(c) { alerts += '<div class="ar"><span><b>' + c.name + '</b></span><button class="hdr-btn" style="padding:4px 8px;font-size:11px" onclick="openModal(' + c.id + ')">📩 تجديد</button></div>'; });
    alerts += '</div>';
  }

  return '<div class="ttl">📊 لوحة التحكم</div>' +
    '<div class="sg">' +
    '<div class="st" onclick="go(\'list\')"><div class="sl" style="background:var(--blue)"></div><div class="si2">👥</div><div class="sv" style="color:var(--blue)">' + C.length + '</div><div class="slb">إجمالي الزبائن</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--green)"></div><div class="si2">✅</div><div class="sv" style="color:var(--green)">' + act.length + '</div><div class="slb">نشطة</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--orange)"></div><div class="si2">⚠️</div><div class="sv" style="color:var(--orange)">' + exp.length + '</div><div class="slb">تنتهي قريباً</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--red)"></div><div class="si2">❌</div><div class="sv" style="color:var(--red)">' + expd.length + '</div><div class="slb">منتهية</div></div>' +
    '<div class="st sw"><div class="sl" style="background:var(--purple)"></div><div class="si2">💰</div><div class="sv" style="color:var(--purple);font-size:18px">' + rev.toLocaleString() + ' دج</div><div class="slb">إجمالي الإيرادات</div></div>' +
    '<div class="st sw"><div class="sl" style="background:#06b6d4"></div><div class="si2">📅</div><div class="sv" style="color:#06b6d4;font-size:18px">' + mRev.toLocaleString() + ' دج</div><div class="slb">مدفوعات هذا الشهر</div></div>' +
    '</div>' + chart + alerts +
    '<div style="display:flex;gap:8px;margin-top:4px">' +
    '<button onclick="go(\'report\')" style="flex:1;padding:10px;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);color:var(--purple);cursor:pointer;font-size:12px;font-weight:600">📊 التقرير الشهري</button>' +
    '<button onclick="window.print()" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--blue);cursor:pointer;font-size:12px;font-weight:600">🖨️ طباعة</button>' +
    '</div>';
}

function getFilt(s) {
  return C.filter(function(c) {
    var m = c.name.indexOf(s) >= 0 || c.phone.indexOf(s) >= 0 || (c.subName || '').indexOf(s) >= 0;
    var d = dl(c.endDate);
    if (filt === 'active') return m && d > 7;
    if (filt === 'warning') return m && d >= 0 && d <= 7;
    if (filt === 'expired') return m && d < 0;
    return m;
  });
}

function cHTML(c) {
  var lf = { ar: '🇩🇿', fr: '🇫🇷', en: '🇬🇧', es: '🇪🇸' }[c.lang || 'ar'] || '🇩🇿';
  var pb = payDue(c) ? '<span class="bPD">💰 يوم ' + c.payDay + '</span>' : '';
  var cl = catLabel(c);
  return '<div class="cc" onclick="openDet(' + c.id + ')">' +
    '<div class="cc-top"><div class="av" style="background:' + avc(c.name) + '">' + c.name[0] + '</div>' +
    '<div style="flex:1"><div class="cn">' + c.name + ' <span style="font-size:11px">' + lf + '</span>' + cl + '</div>' +
    '<div class="cp2">📞 ' + c.phone + '</div></div>' +
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">' + pb + bdg(dl(c.endDate)) + '</div></div>' +
    '<div class="cb"><span>📦 ' + c.plan + '</span>' + (c.subName ? '<span>🏷️ ' + c.subName + '</span>' : '') + '<span>📅 ' + fd(c.endDate) + '</span><span>💰 ' + (c.price || 0).toLocaleString() + ' دج</span></div></div>';
}

function rList() {
  var s = (document.getElementById('sinp') || { value: '' }).value || '';
  var f = getFilt(s);
  var cards = f.length === 0 ? '<div class="empty">لا توجد نتائج 🙁</div>' : f.map(cHTML).join('');
  return '<div class="lhdr"><div class="ttl" style="margin:0">👥 الزبائن (' + C.length + ')</div><button class="abtn" onclick="go(\'add\')">➕ جديد</button></div>' +
    '<div class="srow"><input class="sinp" id="sinp" placeholder="🔍 ابحث..." value="' + s + '" oninput="rl(this.value)"/>' +
    '<select class="fsel" onchange="filt=this.value;render()">' +
    '<option value="all"' + (filt === 'all' ? ' selected' : '') + '>الكل</option>' +
    '<option value="active"' + (filt === 'active' ? ' selected' : '') + '>نشط</option>' +
    '<option value="warning"' + (filt === 'warning' ? ' selected' : '') + '>ينتهي قريباً</option>' +
    '<option value="expired"' + (filt === 'expired' ? ' selected' : '') + '>منتهي</option>' +
    '</select></div><div id="cc">' + cards + '</div>';
}

function rl(v) {
  var el = document.getElementById('cc'); if (!el) return;
  var f = getFilt(v);
  el.innerHTML = f.length === 0 ? '<div class="empty">لا توجد نتائج 🙁</div>' : f.map(cHTML).join('');
}

function rPay() {
  var mn = new Date().getMonth(), yr = new Date().getFullYear(), today = new Date().getDate();
  var tot = C.reduce(function(s, c) { return s + (c.payments || []).reduce(function(a, p) { return a + p.amount; }, 0); }, 0);
  var mP = C.reduce(function(s, c) { return s + (c.payments || []).filter(function(p) { var d = new Date(p.date); return d.getMonth() === mn && d.getFullYear() === yr; }).reduce(function(a, p) { return a + p.amount; }, 0); }, 0);
  var due = C.filter(function(c) { return c.payDay && Math.abs(c.payDay - today) <= 3; });
  var h = '<div class="ttl">💰 الدفعات</div><div class="ps3">' +
    '<div class="ps"><div class="ps-v" style="color:var(--green)">' + mP.toLocaleString() + '</div><div class="ps-l">دج هذا الشهر</div></div>' +
    '<div class="ps"><div class="ps-v" style="color:var(--purple)">' + tot.toLocaleString() + '</div><div class="ps-l">دج الإجمالي</div></div>' +
    '<div class="ps"><div class="ps-v" style="color:var(--orange)">' + due.length + '</div><div class="ps-l">يستحق قريباً</div></div>' +
    '</div>';
  if (due.length) {
    h += '<div class="al al-w" style="margin-bottom:12px"><div class="at">📅 مواعيد الدفع القريبة</div>';
    due.forEach(function(c) {
      var diff = c.payDay - today;
      var lbl = diff === 0 ? 'اليوم!' : diff > 0 ? 'بعد ' + diff + ' أيام' : 'منذ ' + Math.abs(diff) + ' أيام';
      h += '<div class="ar"><span><b>' + c.name + '</b><br><span style="color:var(--text3);font-size:10px">يوم ' + c.payDay + ' — ' + lbl + '</span></span><button class="hdr-btn" style="padding:5px 9px;font-size:11px" onclick="openPay(' + c.id + ')">💰 دفع</button></div>';
    });
    h += '</div>';
  }
  var allP = [];
  C.forEach(function(c) { (c.payments || []).forEach(function(p) { allP.push({ name: c.name, amount: p.amount, date: p.date, note: p.note }); }); });
  allP.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  h += '<div style="font-size:14px;font-weight:800;margin-bottom:10px">📋 آخر الدفعات</div>';
  if (!allP.length) { h += '<div class="empty">لا توجد دفعات 💸</div>'; }
  else { allP.slice(0, 20).forEach(function(p) { h += '<div class="pay-card"><div><div style="font-weight:700;font-size:13px">' + p.name + '</div><div style="font-size:10px;color:var(--text3)">📅 ' + fds(p.date) + (p.note ? ' — ' + p.note : '') + '</div></div><div style="font-size:15px;font-weight:900;color:var(--green)">+' + p.amount.toLocaleString() + ' دج</div></div>'; }); }
  return h;
}

function rCat() {
  var pkgs = getPkgs();
  var h = '<div class="ttl">📦 الكتالوج</div>' +
    '<button onclick="go(\'mcat\')" style="width:100%;padding:10px;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);color:var(--purple);cursor:pointer;font-size:13px;font-weight:700;margin-bottom:14px">⚙️ إدارة الباقات</button>';
  pkgs.forEach(function(pkg) {
    h += '<div style="margin-bottom:16px"><div class="cat-t">' + pkg.icon + ' ' + pkg.server + '</div>';
    pkg.plans.forEach(function(plan) {
      var msg = buildMsg([
        'السلام عليكم 👋',
        '',
        'تفاصيل باقة ' + pkg.server + ' ' + plan.dur + ':',
        '',
        '💰 السعر: ' + plan.price.toLocaleString() + ' دج',
        '⏱️ المدة: ' + plan.dur,
        '✅ جودة 4K',
        '✅ أكثر من 10,000 قناة',
        '✅ دعم 24/7',
        '',
        'للاشتراك راسلنا 💬',
        '— Islam Box Tech Zeboudja'
      ]);
      h += '<div class="pkg"><div class="pkg-top"><div><div class="pkg-n">' + pkg.icon + ' ' + plan.dur + '</div><div class="pkg-d">' + pkg.server + '</div></div><div class="pkg-pr">' + plan.price.toLocaleString() + ' دج</div></div>' +
        '<div class="pkg-btns"><button class="pb pb-c" onclick="cpTxt(' + "'" + encodeURIComponent(msg) + "'" + ',this)">📋 نسخ</button><a class="pb pb-w" href="https://wa.me/?text=' + encodeURIComponent(msg) + '" target="_blank">💬 إرسال</a></div></div>';
    });

  var sub = c.subName ? ' (' + c.subName + ')' : '';
  var mm = MSGS[c.lang || 'ar'] || MSGS.ar;
  var msg = mm.renew(c.name, sub, c.plan, fd(c.endDate));
  window.open(wl(c.phone, msg), '_blank');
  toast('✅ تم التجديد وفتح واتساب!'); render();
}

function openEdit(id) {
  eid = id; var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  document.getElementById('en').value = c.name;
  document.getElementById('ep').value = c.phone;
  document.getElementById('ess').value = c.subName || '';
  document.getElementById('epr').value = c.price || 0;
  document.getElementById('eed').value = c.endDate;
  document.getElementById('epd').value = c.payDay || '';
  document.getElementById('est').value = c.subType || 'code';
  document.getElementById('ecat').value = c.category || 'normal';
  document.getElementById('esrv').value = c.server || '';
  document.getElementById('em3u').value = c.m3uUrl || '';
  document.getElementById('eu').value = c.username || '';
  document.getElementById('epw').value = c.password || '';
  document.getElementById('eov').classList.add('show');
}

function saveEdit() {
  var c = C.find(function(x) { return x.id === eid; }); if (!c) return;
  c.name = document.getElementById('en').value.trim();
  c.phone = document.getElementById('ep').value.trim();
  c.subName = document.getElementById('ess').value.trim();
  c.price = Number(document.getElementById('epr').value) || 0;
  c.endDate = document.getElementById('eed').value;
  c.payDay = parseInt(document.getElementById('epd').value) || null;
  c.subType = document.getElementById('est').value || 'code';
  c.category = document.getElementById('ecat').value || 'normal';
  c.server = document.getElementById('esrv').value.trim();
  c.m3uUrl = document.getElementById('em3u').value.trim();
  c.username = document.getElementById('eu').value.trim();
  c.password = document.getElementById('epw').value.trim();
  sv(); document.getElementById('eov').classList.remove('show');
  toast('✅ تم حفظ التعديلات!'); render();
}

function openPay(id) {
  payId = id; var c = C.find(function(x) { return x.id === id; }); if (!c) return;
  document.getElementById('pcn').textContent = '👤 ' + c.name + ' — ' + c.phone;
  document.getElementById('pamt').value = c.price || '';
  document.getElementById('pdt').value = new Date().toISOString().split('T')[0];
  document.getElementById('pnt').value = '';
  document.getElementById('pov').classList.add('show');
}

function savePay() {
  var c = C.find(function(x) { return x.id === payId; }); if (!c) return;
  var amount = Number(document.getElementById('pamt').value) || 0;
  var date = document.getElementById('pdt').value;
  var note = document.getElementById('pnt').value.trim();
  if (!amount) { alert('أدخل المبلغ'); return; }
  if (!c.payments) c.payments = [];
  c.payments.push({ amount: amount, date: date, note: note });
  sv(); document.getElementById('pov').classList.remove('show');
  toast('✅ تم تسجيل الدفعة — ' + amount.toLocaleString() + ' دج'); render();
}

function openModal(id) {
  mc = C.find(function(x) { return x.id === id; }); if (!mc) return;
  mtype = 'auto';
  document.querySelectorAll('.mt').forEach(function(b) { b.classList.remove('on'); });
  document.querySelector('.mt').classList.add('on');
  document.getElementById('mttl').textContent = '📩 رسالة — ' + mc.name;
  updM(); document.getElementById('ov').classList.add('show');
}

function updM() {
  var t = mtype === 'auto' ? null : mtype;
  var msg = wMsg(mc, t);
  document.getElementById('mta').value = msg;
  document.getElementById('mwal').href = wl(mc.phone, msg);
}

function setMT(btn, t) {
  mtype = t;
  document.querySelectorAll('.mt').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on'); updM();
}

function cpyMsg() {
  navigator.clipboard.writeText(document.getElementById('mta').value).then(function() {
    var b = document.querySelector('.mc'); b.textContent = '✅ تم!';
    setTimeout(function() { b.textContent = '📋 نسخ'; }, 2000);
  });
}

function rReport() {
  var now = new Date(), mn = now.getMonth(), yr = now.getFullYear();
  var months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var newC = C.filter(function(c) { var d = new Date(c.startDate); return d.getMonth() === mn && d.getFullYear() === yr; });
  var expC = C.filter(function(c) { return dl(c.endDate) < 0; });
  var expiring = C.filter(function(c) { var d = dl(c.endDate); return d >= 0 && d <= 7; });
  var vip = C.filter(function(c) { return c.category === 'vip'; });
  var prob = C.filter(function(c) { return c.category === 'problem'; });
  var mRev = C.reduce(function(s, c) { return s + (c.payments || []).filter(function(p) { var d = new Date(p.date); return d.getMonth() === mn && d.getFullYear() === yr; }).reduce(function(a, p) { return a + p.amount; }, 0); }, 0);
  var totRev = C.reduce(function(s, c) { return s + (c.payments || []).reduce(function(a, p) { return a + p.amount; }, 0); }, 0);
  var planStats = {};
  C.forEach(function(c) { var p = c.subName || c.plan || 'أخرى'; planStats[p] = (planStats[p] || 0) + 1; });
  var topPlans = Object.entries(planStats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

  var h = '<button class="bk" onclick="go(\'dash\')">← رجوع</button><div class="ttl">📊 تقرير ' + months[mn] + ' ' + yr + '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">' +
    '<div class="st"><div class="sl" style="background:var(--green)"></div><div class="si2">🆕</div><div class="sv" style="color:var(--green)">' + newC.length + '</div><div class="slb">زبائن جدد</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--purple)"></div><div class="si2">💰</div><div class="sv" style="color:var(--purple);font-size:16px">' + mRev.toLocaleString() + '</div><div class="slb">إيرادات الشهر دج</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--red)"></div><div class="si2">❌</div><div class="sv" style="color:var(--red)">' + expC.length + '</div><div class="slb">اشتراكات منتهية</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--orange)"></div><div class="si2">⚠️</div><div class="sv" style="color:var(--orange)">' + expiring.length + '</div><div class="slb">تنتهي خلال 7 أيام</div></div>' +
    '<div class="st"><div class="sl" style="background:#ffd700"></div><div class="si2">⭐</div><div class="sv" style="color:#ffd700">' + vip.length + '</div><div class="slb">زبائن VIP</div></div>' +
    '<div class="st"><div class="sl" style="background:var(--blue)"></div><div class="si2">💵</div><div class="sv" style="color:var(--blue);font-size:16px">' + totRev.toLocaleString() + '</div><div class="slb">إجمالي الإيرادات دج</div></div>' +
    '</div>';

  if (topPlans.length) {
    h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px">🏆 أكثر الباقات مبيعاً</div>';
    var icons = ['🥇','🥈','🥉','4️⃣','5️⃣'];
    topPlans.forEach(function(x, i) { h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px"><span>' + icons[i] + ' ' + x[0] + '</span><span style="font-weight:800;color:var(--blue)">' + x[1] + ' زبون</span></div>'; });
    h += '</div>';
  }

  if (newC.length) {
    h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px">🆕 الزبائن الجدد</div>';
    newC.forEach(function(c) { h += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span><b>' + c.name + '</b> — ' + (c.subName || c.plan) + '</span><span style="color:var(--green)">' + (c.price || 0).toLocaleString() + ' دج</span></div>'; });
    h += '</div>';
  }

  if (prob.length) {
    h += '<div style="background:var(--bg2);border:1px solid rgba(255,68,68,.3);border-radius:var(--r);padding:14px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">⚠️ مشاكل في الدفع (' + prob.length + ')</div>';
    prob.forEach(function(c) { h += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span><b>' + c.name + '</b></span><span style="color:var(--text3)">📞 ' + c.phone + '</span></div>'; });
    h += '</div>';
  }

  h += '<button onclick="shareReport()" style="width:100%;padding:11px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);color:var(--green);cursor:pointer;font-weight:700;font-size:13px">📩 مشاركة التقرير</button>';
  return h;
}

function shareReport() {
  var now = new Date(), mn = now.getMonth(), yr = now.getFullYear();
  var months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var newC = C.filter(function(c) { var d = new Date(c.startDate); return d.getMonth() === mn && d.getFullYear() === yr; });
  var expC = C.filter(function(c) { return dl(c.endDate) < 0; });
  var mRev = C.reduce(function(s, c) { return s + (c.payments || []).filter(function(p) { var d = new Date(p.date); return d.getMonth() === mn && d.getFullYear() === yr; }).reduce(function(a, p) { return a + p.amount; }, 0); }, 0);
  var msg = buildMsg(['📊 تقرير ' + months[mn] + ' ' + yr, '', '👥 إجمالي الزبائن: ' + C.length, '🆕 زبائن جدد: ' + newC.length, '❌ اشتراكات منتهية: ' + expC.length, '💰 إيرادات الشهر: ' + mRev.toLocaleString() + ' دج', '', '— Islam Box Tech Zeboudja']);
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function expBk() {
  var blob = new Blob([JSON.stringify(C, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'islambox-' + new Date().toISOString().split('T')[0] + '.json';
  a.click(); URL.revokeObjectURL(url); toast('✅ تم تصدير النسخة الاحتياطية!');
}

function impBk(e) {
  var file = e.target.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      if (!Array.isArray(d)) throw new Error('not array');
      if (confirm('استيراد ' + d.length + ' زبون؟')) { C = d; sv(); render(); toast('✅ تم الاستيراد — ' + d.length + ' زبون'); }
    } catch(err) { alert('❌ ملف غير صحيح!'); }
  };
  r.readAsText(file); e.target.value = '';
}

function checkSt() {
  var today = new Date().toDateString();
  if (localStorage.getItem('lc') === today) return;
  localStorage.setItem('lc', today);
  salC = C.filter(function(c) { var d = dl(c.endDate); return d >= 0 && d <= 3; });
  if (!salC.length) return;
  document.getElementById('sal-list').innerHTML = salC.map(function(c) {
    var d = dl(c.endDate);
    return '<div class="sal-r"><span><b>' + c.name + '</b><br><span style="color:var(--text3);font-size:10px">📞 ' + c.phone + (c.subName ? ' — ' + c.subName : '') + '</span></span>' +
      '<div style="display:flex;gap:5px;align-items:center"><span class="bWN">' + d + ' أيام</span>' +
      '<a class="hdr-btn" href="' + wl(c.phone, wMsg(c, 'reminder')) + '" target="_blank" style="text-decoration:none;font-size:12px">📩</a></div></div>';
  }).join('');
  document.getElementById('sal').classList.add('show');
}

function sendAll() {
  if (si >= salC.length) { document.getElementById('sal').classList.remove('show'); si = 0; return; }
  window.open(wl(salC[si].phone, wMsg(salC[si], 'reminder')), '_blank'); si++;
  if (si < salC.length) setTimeout(sendAll, 1500);
  else setTimeout(function() { document.getElementById('sal').classList.remove('show'); si = 0; }, 1000);
}

function askNotif() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    setTimeout(function() { Notification.requestPermission().then(function(p) { if (p === 'granted') showNotif(); }); }, 2000);
  } else if (Notification.permission === 'granted') { showNotif(); }
}

function showNotif() {
  var exp = C.filter(function(c) { var d = dl(c.endDate); return d >= 0 && d <= 3; });
  var due = C.filter(function(c) { return payDue(c); });
  if (exp.length) new Notification('Islam Box Tech ⚠️', { body: exp.length + ' اشتراك ينتهي خلال 3 أيام!' });
  if (due.length) new Notification('Islam Box Tech 💰', { body: due.length + ' زبون موعد دفعه اليوم أو غداً!' });
}

var savedPkgs = localStorage.getItem('ibc_pkgs');
if (savedPkgs) PKGS = JSON.parse(savedPkgs);
render();
checkSt();
askNotif();
</script>
</body>
