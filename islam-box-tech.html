<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Islam Box"/>
<meta name="theme-color" content="#060d1a"/>
<link rel="manifest" id="manifest-placeholder"/>
<title>Islam Box Tech</title>
<style>
:root{--bg:#060d1a;--bg2:#0b1525;--bg3:#0f1d30;--border:#1a3050;--blue:#3b8bff;--blue2:#1a5fe0;--green:#00e676;--orange:#ff9100;--red:#ff4444;--purple:#c084fc;--text:#e8f0fe;--text2:#8aa4c8;--text3:#4a6480;--r:14px;--rs:8px;--hdr:#0a1628}
body.light{--bg:#f0f4ff;--bg2:#ffffff;--bg3:#e8eef8;--border:#c8d8f0;--blue:#1a5fe0;--blue2:#1248b8;--green:#00a854;--orange:#e07800;--red:#d93030;--purple:#8b5cf6;--text:#1a2340;--text2:#3a5278;--text3:#8899bb;--hdr:#dce8ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;min-height:100vh;transition:background .3s,color .3s}
input,select,textarea,button{font-family:inherit;direction:rtl;outline:none}
#hdr{background:var(--hdr);border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:800}
.logo-sub{font-size:10px;color:var(--text3)}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);padding:7px 9px;cursor:pointer;font-size:14px}
nav{display:flex;border-top:1px solid var(--border);margin:0 -14px}
.nb{flex:1;padding:9px 2px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;margin-bottom:-1px}
.nb span{font-size:16px}
.nb.on{color:var(--blue);border-bottom-color:var(--blue)}
#pg{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.ttl{font-size:18px;font-weight:800;margin-bottom:14px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.st{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer}
.sl{height:2px;margin:-14px -14px 10px;border-radius:var(--r) var(--r) 0 0}
.si2{font-size:22px;margin-bottom:4px}
.sv{font-size:24px;font-weight:900}
.slb{font-size:10px;color:var(--text3);margin-top:2px}
.sw{grid-column:span 2}
.al{border-radius:var(--r);padding:12px;margin-bottom:12px;border:1px solid}
.al-w{background:rgba(255,145,0,.08);border-color:rgba(255,145,0,.3)}
.al-e{background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3)}
.at{font-size:13px;font-weight:700;margin-bottom:8px}
.al-w .at{color:var(--orange)}
.al-e .at{color:var(--red)}
.ar{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.ar:last-child{border-bottom:none}
.bOK{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bWN{background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bEX{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bPD{background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bVIP{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.bST{background:rgba(6,182,212,.1);color:#06b6d4;border:1px solid rgba(6,182,212,.3);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.lhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.abtn{background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);padding:9px 16px;cursor:pointer;font-weight:700;font-size:12px}
.srow{display:flex;gap:8px;margin-bottom:12px}
.sinp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:13px}
.sinp:focus{border-color:var(--blue)}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--text);font-size:12px}
.empty{text-align:center;color:var(--text3);padding:50px 20px;font-size:15px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;cursor:pointer}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.cn{font-weight:700;font-size:14px}
.cp2{font-size:11px;color:var(--text3);margin-top:2px}
.cb{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);border-top:1px solid var(--border);padding-top:7px;flex-wrap:wrap;gap:4px}
.fw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.fl{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:12px;font-weight:600}
.fl:first-child{margin-top:0}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px 12px;color:var(--text);font-size:14px}
.fi:focus{border-color:var(--blue)}
select.fi{cursor:pointer}
.dr{display:flex;gap:6px;flex-wrap:wrap}
.db{flex:1;min-width:55px;padding:10px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:12px;text-align:center}
.db.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.lb{flex:1;min-width:65px;padding:9px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:11px;text-align:center}
.lb.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.prev{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:2}
.sbtn{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:15px;font-weight:800}
.cbox{background:var(--bg);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);padding:12px;margin-top:12px}
.cbox-t{color:var(--blue);font-size:12px;font-weight:700;margin-bottom:8px}
.nbox{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.nbox-t{color:var(--purple);font-size:13px;font-weight:700;margin-bottom:10px}
.nbtn{width:100%;margin-top:8px;padding:10px;background:linear-gradient(135deg,#6d28d9,var(--blue2));color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;padding:8px 14px;font-weight:600}
.dh{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px}
.dav{width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 10px}
.dn{font-size:20px;font-weight:800}
.dph{color:var(--text3);font-size:13px;margin:4px 0 10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.di{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.di-l{color:var(--text3)}
.dacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.bwa{flex:1;padding:11px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bed{flex:1;padding:11px;background:rgba(59,139,255,.1);color:var(--blue);border:1px solid rgba(59,139,255,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.bdl{padding:11px 14px;background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.brn{width:100%;margin-top:7px;padding:11px;background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.brw{width:100%;margin-top:7px;padding:11px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.bpy{width:100%;margin-top:7px;padding:11px;background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:13px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px}
.crow:last-of-type{border-bottom:none}
.cvals{display:flex;align-items:center;gap:5px;max-width:65%}
.cv{font-family:monospace;font-size:11px;word-break:break-all}
.cpb{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:3px 7px;font-size:11px}
.pay-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ps3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.ps{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;text-align:center}
.ps-v{font-size:18px;font-weight:900;margin-bottom:2px}
.ps-l{font-size:10px;color:var(--text3)}
.cat-t{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;padding:8px 12px;background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:var(--rs)}
.pkg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.pkg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pkg-n{font-size:14px;font-weight:800}
.pkg-pr{font-size:18px;font-weight:900;color:var(--green)}
.pkg-d{font-size:11px;color:var(--text3)}
.pkg-btns{display:flex;gap:7px}
.pb{flex:1;padding:9px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:700;border:1px solid;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
.pb-c{background:rgba(59,139,255,.1);color:var(--blue);border-color:rgba(59,139,255,.3)}
.pb-w{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.3)}
.tmpl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px}
.tmpl-t{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}
.tmpl-p{font-size:11px;color:var(--text3);line-height:1.7;margin-bottom:10px;background:var(--bg);border-radius:6px;padding:8px;max-height:70px;overflow:hidden}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mttl{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--blue)}
.mta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px;color:var(--text);font-size:12px;line-height:1.9;resize:none}
.mt-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.mt{flex:1;min-width:60px;padding:7px 4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:10px;text-align:center}
.mt.on{background:rgba(59,139,255,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.macts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.mc{flex:1;padding:10px;background:rgba(59,139,255,.15);color:var(--blue);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px}
.mw{flex:1;padding:10px;background:rgba(0,230,118,.1);color:var(--green);border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;font-size:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
.mx{padding:10px 14px;background:rgba(255,68,68,.1);color:var(--red);border:none;border-radius:var(--rs);cursor:pointer}
#sal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;padding:14px}
#sal.show{display:flex}
.sal-box{background:var(--bg2);border:2px solid rgba(255,145,0,.5);border-radius:16px;padding:18px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.sal-t{font-size:16px;font-weight:800;color:var(--orange);margin-bottom:12px;text-align:center}
.sal-r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;font-size:12px}
.sal-r:last-of-type{border-bottom:none}
.sal-f{display:flex;gap:7px;margin-top:12px}
.sal-a{flex:1;padding:12px;background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:800;font-size:13px}
.sal-s{padding:12px 14px;background:var(--bg);color:var(--text3);border:none;border-radius:var(--rs);cursor:pointer}
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#065f46,#1e40af);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:2000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:400px}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:10px}
.ai-msg{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6}
.ai-msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--blue2),#6d28d9);color:#fff;border-radius:14px 14px 4px 14px}
.ai-msg.bot{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:14px 14px 14px 4px}
.ai-msg.bot.loading{color:var(--text3)}
.ai-inp{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.ai-tf{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:11px 16px;color:var(--text);font-size:13px;resize:none;max-height:80px}
.ai-tf:focus{border-color:var(--blue);outline:none}
.ai-send{background:linear-gradient(135deg,var(--blue2),#6d28d9);border:none;border-radius:50%;width:42px;height:42px;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;align-self:flex-end}
.ai-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.ai-chip{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text2);cursor:pointer}
@media print{#hdr,#sal,.ov,.bk,.dacts,.abtn{display:none!important}body{background:#fff;color:#000}.cc,.dh{border:1px solid #ddd;background:#fff}}
#lock-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#lock-screen.show{display:flex}
.lock-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px}
.lock-title{font-size:20px;font-weight:800;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:30px}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:.2s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{height:64px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:22px;font-weight:700;cursor:pointer}
.pin-btn:active{background:rgba(59,139,255,.2);border-color:var(--blue)}
.pin-del{font-size:18px}
.lock-hint{font-size:11px;color:var(--text3);margin-top:16px;text-align:center}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-logo">📺</div>
  <div class="lock-title">Islam Box Tech</div>
  <div class="lock-sub" id="lock-sub">أدخل رمز PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('')"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn pin-del" onclick="pinDel()">⌫</button>
  </div>
  <div class="lock-hint" id="lock-hint"></div>
</div>
<div id="hdr">
  <div class="hdr-top">
    <div class="logo-wrap">
      <div class="logo-icon">📺</div>
      <div><div class="logo-text">Islam Box Tech</div><div class="logo-sub">Zeboudja — إدارة الاشتراكات</div></div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="hdr-btn" onclick="expBk()">💾</button>
      <button class="hdr-btn" onclick="document.getElementById('impf').click()">📥</button>
      <input type="file" id="impf" accept=".json" style="display:none" onchange="impBk(event)"/>
    </div>
  </div>
  <nav>
    <button class="nb on" onclick="go('dash')"><span>🏠</span>الرئيسية</button>
    <button class="nb" onclick="go('list')"><span>👥</span>الزبائن</button>
    <button class="nb" onclick="go('pay')"><span>💰</span>الدفعات</button>
    <button class="nb" onclick="go('cat')"><span>📦</span>الكتالوج</button>
    <button class="nb" onclick="go('add')"><span>➕</span>جديد</button>
    <button class="nb" onclick="go('ai')"><span>🤖</span>مساعد</button>

function getFilt(s) {
  return C.filter(function(c) {
    var m = c.name.indexOf(s) >= 0 || c.phone.indexOf(s) >= 0 || (c.subName || '').indexOf(s) >= 0;
    var d = dl(c.endDate);
    if (filt === 'active') m = m && d > 7;
    else if (filt === 'warning') m = m && d >= 0 && d <= 7;
    else if (filt === 'expired') m = m && d < 0;
    if (filtType !== 'all') m = m && (c.subType || 'code') === filtType;
    return m;
  });
}

}

function parseM3U(url) {
  var st = document.getElementById('m3u-parse-status');
  if (!url || url.length < 10) { if(st) st.textContent = ''; return; }
  try {
    var u = new URL(url);
    var user = u.searchParams.get('username') || u.searchParams.get('user') || '';
    var pass = u.searchParams.get('password') || u.searchParams.get('pass') || '';
    var srv = u.origin + (u.port ? '' : '');
    var filled = [];
    if (srv && srv !== 'null') {
      var srvEl = document.getElementById('fsrv');
      if (srvEl && !srvEl.value) { srvEl.value = srv; filled.push('السيرفر'); }
    }
    if (user) {
      var usEl = document.getElementById('fus');
      if (usEl && !usEl.value) { usEl.value = user; filled.push('اليوزر'); }
    }
    if (pass) {
      var pwEl = document.getElementById('fpw');
      if (pwEl && !pwEl.value) { pwEl.value = pass; filled.push('الباسورد'); }
    }
    if (st) st.textContent = filled.length ? '✅ تم استخراج: ' + filled.join('، ') + ' تلقائياً!' : '';
  } catch(e) { if(st) st.textContent = ''; }
}

function autoFillPlan(val) {
  var st = document.getElementById('plan-fill-status');
  if (!val) { if(st) st.textContent = ''; return; }
  var parts = val.split('_');
  var pkgs = getPkgs();
  var pkg = pkgs[parseInt(parts[0])];
  var plan = pkg && pkg.plans[parseInt(parts[1])];
  if (!plan) return;
  var filled = [];
  var snEl = document.getElementById('fsn');
  if (snEl) { snEl.value = pkg.server + ' — ' + plan.dur; filled.push('الباقة'); }
  var prEl = document.getElementById('fpr');
  if (prEl) { prEl.value = plan.price; filled.push('السعر'); }
  var costEl = document.getElementById('fcost');
  if (costEl && plan.cost) { costEl.value = plan.cost; filled.push('التكلفة'); }
  if (plan.months) {
    dur = plan.months; customEndDate = null;
    var s2 = new Date(), e2 = addM(s2, dur);
    var prev = document.getElementById('date-prev');
    if (prev) prev.innerHTML = '📅 البداية: <b>' + fd(s2.toISOString().split('T')[0]) + '</b><br>📅 النهاية: <b>' + fd(e2.toISOString().split('T')[0]) + '</b>';
    filled.push('المدة');
  }
  if (st) st.textContent = filled.length ? '✅ تم تعبئة: ' + filled.join('، ') + ' تلقائياً!' : '';
}

function getDataSummary() {
  var today = new Date();
  var mn = today.getMonth(), yr = today.getFullYear();
  var exp7 = C.filter(function(c){ return dl(c.endDate)>=0&&dl(c.endDate)<=7; });
  var expd = C.filter(function(c){ return dl(c.endDate)<0; });
  var act = C.filter(function(c){ return dl(c.endDate)>7; });
  var mRev = C.reduce(function(s,c){ return s+(c.payments||[]).filter(function(p){ var d=new Date(p.date); return d.getMonth()===mn&&d.getFullYear()===yr; }).reduce(function(a,p){ return a+p.amount; },0); },0);
  var totRev = C.reduce(function(s,c){ return s+(c.payments||[]).reduce(function(a,p){ return a+p.amount; },0); },0);
  var vip = C.filter(function(c){ return c.category==='vip'; });
  var prob = C.filter(function(c){ return c.category==='problem'; });
  var noPayThisMonth = C.filter(function(c){
    return !(c.payments||[]).some(function(p){ var d=new Date(p.date); return d.getMonth()===mn&&d.getFullYear()===yr; });
  });
  var typeCount = {};
  C.forEach(function(c){ var t=c.subType||'code'; typeCount[t]=(typeCount[t]||0)+1; });
  return {
    total: C.length, active: act.length, expiring: exp7.length, expired: expd.length,
    monthRevenue: mRev, totalRevenue: totRev, vip: vip.length, problem: prob.length,
    noPayThisMonth: noPayThisMonth.length,
    typeCount: typeCount,
    expiringList: exp7.map(function(c){ return c.name+' ('+dl(c.endDate)+' أيام — '+c.phone+')'; }),
    expiredList: expd.slice(0,10).map(function(c){ return c.name+' — '+c.phone; }),
    noPayList: noPayThisMonth.slice(0,10).map(function(c){ return c.name+' — '+c.phone; }),
    vipList: vip.map(function(c){ return c.name; }),
    probList: prob.map(function(c){ return c.name+' — '+c.phone; })
  };
}

async function sendAI() {
  if (!aiKey) { toast('⚠️ أدخل API Key أولاً'); go('ai'); return; }
  var tf = document.getElementById('ai-tf');
  var q = (tf ? tf.value : '').trim();
  if (!q) return;
  tf.value = '';
  aiHistory.push({ role: 'user', text: q });
  var msgs = document.getElementById('ai-msgs');
  if (msgs) msgs.innerHTML += '<div class="ai-msg user">' + q.replace(/\n/g,'<br>') + '</div><div class="ai-msg bot loading" id="ai-loading">⏳ جاري التفكير...</div>';
  if (msgs) msgs.scrollTop = msgs.scrollHeight;

  var data = getDataSummary();

  var messages = aiHistory.slice(0,-1).map(function(m){ return { role: m.role==='user'?'user':'assistant', content: m.text }; });
  messages.push({ role: 'user', content: q });

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': aiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt, messages: messages })
    });
    var json = await res.json();
    if (json.error) throw new Error(json.error.message);
    var answer = (json.content && json.content[0] && json.content[0].text) || '❌ لم أتمكن من الإجابة';
    aiHistory.push({ role: 'bot', text: answer });
    var loading = document.getElementById('ai-loading');
    if (loading) { loading.id=''; loading.classList.remove('loading'); loading.innerHTML = answer.replace(/\n/g,'<br>'); }
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    var loading = document.getElementById('ai-loading');
    if (loading) { loading.id=''; loading.classList.remove('loading'); loading.textContent = '❌ ' + (e.message || 'خطأ في الاتصال'); }
  }
}

// ===== PIN LOCK =====
var pinInput = '';
var pinSaved = localStorage.getItem('ibc_pin') || '';
var pinMode = 'unlock'; // unlock | setup | confirm
var pinTemp = '';

function initLock() {
  if (!pinSaved) { return; } // no PIN set → skip
  document.getElementById('lock-screen').classList.add('show');
  pinMode = 'unlock';
  document.getElementById('lock-sub').textContent = 'أدخل رمز PIN';
}

function pinPress(v) {
  if (!v) return;
  if (pinInput.length >= 4) return;
  pinInput += v;
  updateDots();
  if (pinInput.length === 4) setTimeout(checkPin, 150);
}

function pinDel() {
  pinInput = pinInput.slice(0, -1);
  updateDots();
}

function updateDots(err) {
  for (var i = 0; i < 4; i++) {
    var d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < pinInput.length);
    d.classList.toggle('error', !!err);
  }
}

function checkPin() {
  if (pinMode === 'unlock') {
    if (pinInput === pinSaved) {
      document.getElementById('lock-screen').classList.remove('show');
      pinInput = '';
      updateDots();
    } else {
      updateDots(true);
      document.getElementById('lock-sub').textContent = '❌ رمز خاطئ';
      setTimeout(function() {
        pinInput = ''; updateDots();
        document.getElementById('lock-sub').textContent = 'أدخل رمز PIN';
      }, 1000);
    }
  } else if (pinMode === 'setup') {
    pinTemp = pinInput;
    pinInput = '';
    updateDots();
    pinMode = 'confirm';
    document.getElementById('lock-sub').textContent = 'أعد إدخال الرمز للتأكيد';
  } else if (pinMode === 'confirm') {
    if (pinInput === pinTemp) {
      pinSaved = pinInput;
      localStorage.setItem('ibc_pin', pinSaved);
      pinInput = ''; pinTemp = '';
      document.getElementById('lock-screen').classList.remove('show');
      toast('✅ تم تفعيل قفل PIN!');
      render();
    } else {
      updateDots(true);
      document.getElementById('lock-sub').textContent = '❌ الرمز غير متطابق';
      setTimeout(function() {
        pinInput = ''; pinTemp = ''; pinMode = 'setup'; updateDots();
        document.getElementById('lock-sub').textContent = 'أدخل رمز PIN جديد';
      }, 1000);
    }
  }
}

function setupPin() {
  pinMode = 'setup'; pinInput = '';
  document.getElementById('lock-sub').textContent = 'أدخل رمز PIN جديد';
  document.getElementById('lock-hint').textContent = '4 أرقام';
  document.getElementById('lock-screen').classList.add('show');
  updateDots();
}

function removePin() {
  if (!confirm('إزالة قفل PIN؟')) return;
  pinSaved = ''; localStorage.removeItem('ibc_pin');
  toast('🔓 تم إزالة قفل PIN'); render();
}

  }
}
